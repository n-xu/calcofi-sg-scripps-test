<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalCOFI Station Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --ocean:   #0a1628;
    --deep:    #061020;
    --surface: #0d2040;
    --accent:  #00c2ff;
    --accent2: #00ffb3;
    --warm:    #ff6b35;
    --text:    #e8f4f8;
    --muted:   #5a7a8a;
    --panel:   #0f1e35;
    --border:  rgba(0,194,255,0.15);
    --glow:    0 0 20px rgba(0,194,255,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--deep); color: var(--text); font-family: 'Space Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--ocean); border-bottom: 1px solid var(--border); z-index: 1000; flex-shrink: 0; }
  .logo { display: flex; align-items: baseline; gap: 12px; }
  .logo-title { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--accent); letter-spacing: 0.5px; }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .header-stats { display: flex; gap: 24px; }
  .stat { text-align: right; }
  .stat-num { font-size: 18px; color: var(--accent2); font-weight: 700; }
  .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

  /* Search bar */
  .search-bar { padding: 10px 24px; background: var(--ocean); border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-shrink: 0; position: relative; z-index: 500; }

  /* Dropdown search wrapper */
  .search-wrapper { flex: 1; position: relative; }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); box-shadow: var(--glow); }

  /* Dropdown */
  .dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    max-height: 280px;
    overflow-y: auto;
    z-index: 9999;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .dropdown.open { display: block; }
  .dropdown::-webkit-scrollbar { width: 4px; }
  .dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .dropdown-item {
    padding: 9px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid rgba(0,194,255,0.06);
    transition: background 0.1s;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.focused { background: var(--surface); }
  .dropdown-item.active { background: rgba(0,194,255,0.1); }

  .dropdown-name { font-size: 11px; color: var(--text); flex: 1; }
  .dropdown-name mark { background: transparent; color: var(--accent); font-weight: 700; }
  .dropdown-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .dropdown-category { font-size: 9px; color: var(--accent2); letter-spacing: 1px; text-transform: uppercase; }
  .dropdown-source { font-size: 9px; color: var(--muted); }
  .dropdown-count { font-size: 9px; color: var(--muted); }
  .dropdown-empty { padding: 16px 14px; font-size: 11px; color: var(--muted); text-align: center; }

  /* Category filters */
  .category-filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 12px; border-radius: 3px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); color: var(--deep); border-color: var(--accent); font-weight: 700; }

  .clear-btn { padding: 6px 12px; border-radius: 3px; border: 1px solid rgba(255,107,53,0.4); background: transparent; color: var(--warm); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; display: none; white-space: nowrap; }
  .clear-btn.visible { display: block; }
  .clear-btn:hover { background: var(--warm); color: white; }

  /* Search banner */
  .search-banner { display: none; padding: 7px 24px; background: rgba(0,194,255,0.08); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--accent); letter-spacing: 0.5px; flex-shrink: 0; }
  .search-banner.visible { display: block; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; background: var(--deep); z-index: 1; }

  /* Side panel */
  .panel { width: 360px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .panel-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-station-id { font-size: 22px; color: var(--accent); font-weight: 700; letter-spacing: 1px; }
  .panel-coords { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .btn-download-all {
    display: block;
    margin-top: 12px;
    padding: 9px 14px;
    background: rgba(0,255,179,0.08);
    border: 1px solid rgba(0,255,179,0.3);
    border-radius: 4px;
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-decoration: none;
    text-align: center;
    transition: all 0.2s;
  }
  .btn-download-all:hover {
    background: rgba(0,255,179,0.18);
    border-color: var(--accent2);
  }
  .panel-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); text-align: center; padding: 40px; gap: 12px; }
  .panel-empty-icon { font-size: 36px; opacity: 0.4; }
  .panel-empty-text { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 15px; line-height: 1.8; }
  .panel-content { flex: 1; overflow-y: auto; padding: 16px; display: none; }
  .panel-content.visible { display: block; }
  .panel-content::-webkit-scrollbar { width: 4px; }
  .panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Source groups in panel */
  .source-group { margin-bottom: 22px; }
  .source-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid rgba(0,194,255,0.15); }
  .category-sublabel { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent2); margin: 8px 0 4px; opacity: 0.7; }

  .data-link { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-radius: 4px; border: 1px solid transparent; margin-bottom: 3px; cursor: pointer; transition: all 0.15s; text-decoration: none; color: var(--text); }
  .data-link:hover { background: var(--surface); border-color: var(--border); }
  .data-link-name { font-size: 11px; line-height: 1.4; flex: 1; }
  .data-link-unit { font-size: 9px; color: var(--muted); margin-left: 8px; white-space: nowrap; }
  .data-link-arrow { font-size: 10px; color: var(--accent); margin-left: 8px; opacity: 0; transition: opacity 0.15s; }
  .data-link:hover .data-link-arrow { opacity: 1; }

  .loading { padding: 40px; text-align: center; color: var(--muted); font-size: 11px; letter-spacing: 1px; }

  /* Modal */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9000; align-items: center; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; width: 420px; max-width: 90vw; box-shadow: 0 16px 48px rgba(0,0,0,0.6), var(--glow); overflow: hidden; animation: modalIn 0.15s ease; }
  @keyframes modalIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .modal-title { font-size: 13px; color: var(--text); line-height: 1.4; flex: 1; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0; line-height: 1; transition: color 0.15s; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }
  .modal-row { display: flex; justify-content: space-between; align-items: center; }
  .modal-row-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .modal-row-value { font-size: 11px; color: var(--text); text-align: right; max-width: 260px; word-break: break-all; }
  .modal-row-value.accent { color: var(--accent2); }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  select option { background: var(--panel); color: var(--text); }
  select optgroup { color: var(--muted); font-style: normal; }
  .btn-download { flex: 1; padding: 10px 16px; background: var(--accent); color: var(--deep); border: none; border-radius: 4px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; text-decoration: none; text-align: center; transition: opacity 0.15s; display: block; }
  .btn-download:hover { opacity: 0.85; }
  .btn-docs { padding: 10px 16px; background: transparent; color: var(--accent); border: 1px solid var(--border); border-radius: 4px; font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer; text-decoration: none; text-align: center; transition: all 0.15s; display: block; }
  .btn-docs:hover { background: var(--surface); }

  /* Leaflet overrides */
  .leaflet-container { background: #06121f !important; }
  .leaflet-control-zoom a { background: var(--panel) !important; color: var(--accent) !important; border-color: var(--border) !important; }
  .leaflet-control-attribution { background: rgba(6,16,32,0.8) !important; color: var(--muted) !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: var(--muted) !important; }
  .leaflet-tooltip { background: var(--panel); border: 1px solid var(--border); color: var(--text); font-family: 'Space Mono', monospace; font-size: 11px; padding: 4px 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-title">CalCOFI</span>
    <span class="logo-sub">Station Data Portal</span>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="station-count">—</div>
      <div class="stat-label">Stations</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="variable-count">—</div>
      <div class="stat-label">Variables</div>
    </div>
  </div>
</header>

<div class="search-bar">
  <div class="search-wrapper">
    <input class="search-input" id="search" type="text" placeholder="Search variables (e.g. chlorophyll, nitrate, salinity)…" autocomplete="off" />
    <div class="dropdown" id="dropdown"></div>
  </div>
  <div class="category-filters" id="category-filters"></div>
  <button class="clear-btn" id="clear-btn" onclick="clearAll()">✕ Clear</button>
</div>

<div class="search-banner" id="search-banner"></div>

<div class="main">
  <div id="map"></div>
  <div class="panel" id="panel">
    <div class="panel-empty" id="panel-empty">
      <div class="panel-empty-icon">🌊</div>
      <div class="panel-empty-text">Click any station<br>to explore its data</div>
    </div>
    <div class="panel-header" id="panel-header" style="display:none">
      <div class="panel-station-id" id="panel-station-id"></div>
      <div class="panel-coords" id="panel-coords"></div>
      <a class="btn-download-all"
         href="https://calcofi.org/downloads/database/CalCOFI_4903-2311_Master_LTER.accdb"
         download
         title="Full CalCOFI LTER Master Database 1949–2023 (346MB)">
        ⬇ Download All Data (LTER Master DB)
      </a>
    </div>
    <div class="panel-content" id="panel-content"></div>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';

// --- Map ---
const map = L.map('map', { center: [32.5, -119.5], zoom: 6 })
  .addLayer(L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 14,
  }));

// --- State ---
let allStations = [];
let allVariables = [];
let markers = {};
let activeCategory = null;
let selectedVariable = null;
let dropdownFocusIdx = -1;

// --- Station markers ---
function makeMarkerStyle(highlighted) {
  return {
    radius:      highlighted ? 9 : 7,
    fillColor:   highlighted ? '#00c2ff' : '#1a4a6e',
    color:       highlighted ? '#00ffb3' : '#0d7aad',
    weight:      1.5,
    fillOpacity: highlighted ? 0.95 : 0.7,
    opacity:     1,
  };
}

function dimMarkerStyle() {
  return { fillColor: '#0d2a40', color: '#0d4060', fillOpacity: 0.2, radius: 5 };
}

async function loadStations() {
  console.log("LOADING STATIONS");
  try {
    const res = await fetch(`${API}/stations`);
    const data = await res.json();

    const stations = Array.isArray(data) ? data : data?.data;

    if (!Array.isArray(stations)) {
      console.error("Stations format invalid:", data);
      return;
    }

    stations.forEach(station => {
      if (!station.lat || !station.lon) return;

      const marker = L.circleMarker([station.lat, station.lon], {
        radius: 10,
        color: '#00c2ff',
        fillOpacity: 0.7
      }).addTo(map);

      marker.on('click', () => openStation(station));
    });

  } catch (err) {
    console.error("Failed to load stations:", err);
  }
}

// --- Variables + categories ---
async function loadVariables() {
  const res = await fetch(`${API}/variables`);
  allVariables = await res.json();
  document.getElementById('variable-count').textContent = allVariables.length;

  const catRes = await fetch(`${API}/categories`);
  const categories = await catRes.json();
  renderCategoryFilters(categories);
}

function renderCategoryFilters(categories) {
  const container = document.getElementById('category-filters');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.onclick = () => toggleCategory(cat, btn);
    container.appendChild(btn);
  });
}

// --- Dropdown search ---
const searchInput = document.getElementById('search');
const dropdown   = document.getElementById('dropdown');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  dropdownFocusIdx = -1;
  if (!q) { closeDropdown(); clearHighlights(); return; }
  renderDropdown(q);
});

searchInput.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.dropdown-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    dropdownFocusIdx = Math.min(dropdownFocusIdx + 1, items.length - 1);
    updateDropdownFocus(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    dropdownFocusIdx = Math.max(dropdownFocusIdx - 1, 0);
    updateDropdownFocus(items);
  } else if (e.key === 'Enter') {
    if (dropdownFocusIdx >= 0 && items[dropdownFocusIdx]) {
      items[dropdownFocusIdx].click();
    }
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
});

searchInput.addEventListener('blur', () => {
  // small delay so clicks on dropdown register first
  setTimeout(closeDropdown, 150);
});

function renderDropdown(query) {
  const q = query.toLowerCase();
  let matches = allVariables.filter(v => v.name.toLowerCase().includes(q));

  // also filter by active category if set
  if (activeCategory) matches = matches.filter(v => v.category === activeCategory);

  dropdown.innerHTML = '';
  if (matches.length === 0) {
    dropdown.innerHTML = '<div class="dropdown-empty">No variables found</div>';
    dropdown.classList.add('open');
    return;
  }

  matches.slice(0, 30).forEach((v, i) => {
    const item = document.createElement('div');
    item.className = 'dropdown-item';
    item.dataset.idx = i;

    // Highlight matching part of name
    const nameHtml = v.name.replace(new RegExp(`(${escapeRe(query)})`, 'gi'), '<mark>$1</mark>');

    item.innerHTML = `
      <span class="dropdown-name">${nameHtml}</span>
      <span class="dropdown-meta">
        <span class="dropdown-category">${v.category}</span>
        <span class="dropdown-source">· ${v.source}</span>
        <span class="dropdown-count">(${v.station_count})</span>
      </span>`;

    item.addEventListener('mousedown', () => selectVariable(v));
    dropdown.appendChild(item);
  });

  dropdown.classList.add('open');
}

function updateDropdownFocus(items) {
  items.forEach((el, i) => el.classList.toggle('focused', i === dropdownFocusIdx));
  if (items[dropdownFocusIdx]) items[dropdownFocusIdx].scrollIntoView({ block: 'nearest' });
}

function closeDropdown() {
  dropdown.classList.remove('open');
  dropdownFocusIdx = -1;
}

function selectVariable(variable) {
  selectedVariable = variable;
  searchInput.value = variable.name;
  closeDropdown();

  const ids = new Set(variable.station_ids);
  highlightStations(ids);

  const banner = document.getElementById('search-banner');
  banner.textContent = `${ids.size} stations have "${variable.name}" (${variable.category} · ${variable.source})`;
  banner.classList.add('visible');
  document.getElementById('clear-btn').classList.add('visible');
}

function escapeRe(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// --- Category filter ---
function toggleCategory(cat, btn) {
  if (activeCategory === cat) {
    activeCategory = null;
    btn.classList.remove('active');
    if (!selectedVariable) { clearHighlights(); document.getElementById('clear-btn').classList.remove('visible'); }
  } else {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = cat;

    // Filter to stations that have any variable in this category
    const ids = new Set();
    allVariables.filter(v => v.category === cat).forEach(v => v.station_ids.forEach(id => ids.add(id)));
    highlightStations(ids);

    const banner = document.getElementById('search-banner');
    banner.textContent = `${ids.size} stations have ${cat} data`;
    banner.classList.add('visible');
    document.getElementById('clear-btn').classList.add('visible');
  }
}

// --- Highlight stations ---
function highlightStations(ids) {
  allStations.forEach(s => {
    const m = markers[s.station_id];
    if (!m) return;
    if (ids.size === 0 || ids.has(s.station_id)) {
      m.setStyle(makeMarkerStyle(true));
    } else {
      m.setStyle(dimMarkerStyle());
    }
  });
}

function clearHighlights() {
  allStations.forEach(s => { if (markers[s.station_id]) markers[s.station_id].setStyle(makeMarkerStyle(true)); });
}

function clearAll() {
  selectedVariable = null;
  activeCategory = null;
  searchInput.value = '';
  closeDropdown();
  clearHighlights();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('search-banner').classList.remove('visible');
  document.getElementById('clear-btn').classList.remove('visible');
}

// --- Modal ---

// Per-cruise CTD direct download URLs (confirmed from calcofi.org/downloads/)
// const CTD_CRUISES = [
//   { label: '2024 Jan (2401RL)', url: 'https://calcofi.org/downloads/2024/20-2401RL_CTDPrelim.zip' },
//   { label: '2024 Apr (2404SH)', url: 'https://calcofi.org/downloads/2024/20-2404SH_CTDPrelim.zip' },
//   { label: '2024 Aug (2408SR)', url: 'https://calcofi.org/downloads/2024/20-2408SR_CTDPrelim.zip' },
//   { label: '2024 Nov (2411SR)', url: 'https://calcofi.org/downloads/2024/20-2411SR_CTDPrelim.zip' },
//   { label: '2023 Jan (2301RL)', url: 'https://calcofi.org/downloads/2023/20-2301RL_CTDPrelim.zip' },
//   { label: '2023 Apr (2304SH)', url: 'https://calcofi.org/downloads/2023/20-2304SH_CTDPrelim.zip' },
//   { label: '2023 Jul (2307SR)', url: 'https://calcofi.org/downloads/2023/20-2307SR_CTDPrelim.zip' },
//   { label: '2023 Nov (2311SR)', url: 'https://calcofi.org/downloads/2023/20-2311SR_CTDPrelim.zip' },
//   { label: '2022 Apr (2204SH)', url: 'https://calcofi.org/downloads/2022/20-2204SH_CTDPrelim.zip' },
//   { label: '2022 Aug (2208BH)', url: 'https://calcofi.org/downloads/2022/20-2208BH_CTDPrelim.zip' },
//   { label: '2022 Nov (2211SR)', url: 'https://calcofi.org/downloads/2022/20-2211SR_CTDPrelim.zip' },
//   { label: '2020 Jan (2001RL)', url: 'https://calcofi.org/downloads/2020/20-2001RL_CTDPrelim.zip' },
//   { label: '2020 Jul (2007SR)', url: 'https://calcofi.org/downloads/2020/20-2007SR_CTDPrelim.zip' },
//   { label: '2020 Oct (2010SR)', url: 'https://calcofi.org/downloads/2020/20-2010SR_CTDPrelim.zip' },
// ];

// // Per-year CTD database files (final processed, 2009-2012)
// const CTD_DB_YEARS = [
//   { label: '2009-2012 (combined DB)', url: 'https://calcofi.org/downloads/database/CTD/2009-2012_ctddb.zip' },

function openModal(v) {
  const modalBackdrop = document.getElementById('modal-backdrop');
  const modalTitle = document.getElementById('modal-title');
  const modalBody = document.getElementById('modal-body');
  const footer = document.getElementById('modal-footer');

  modalTitle.textContent = v.name;

  // ---------- BODY ----------
  modalBody.innerHTML = `
    <div class="modal-row">
      <span class="modal-row-label">Source</span>
      <span class="modal-row-value accent">${v.source || 'Unknown'}</span>
    </div>

    <div class="modal-row">
      <span class="modal-row-label">Category</span>
      <span class="modal-row-value">${v.category || 'Uncategorized'}</span>
    </div>

    ${v.unit ? `
      <div class="modal-row">
        <span class="modal-row-label">Unit</span>
        <span class="modal-row-value">${v.unit}</span>
      </div>` : ''}

    ${v.date_range_start ? `
      <div class="modal-row">
        <span class="modal-row-label">Date Range</span>
        <span class="modal-row-value">
          ${v.date_range_start} → ${v.date_range_end || 'Present'}
        </span>
      </div>` : ''}

    <div class="modal-row">
      <span class="modal-row-label">Format</span>
      <span class="modal-row-value">${v.format || 'ERDDAP / CSV'}</span>
    </div>

    ${v.notes ? `
      <div class="modal-row">
        <span class="modal-row-label">Notes</span>
        <span class="modal-row-value" style="font-size:10px;color:var(--muted)">
          ${v.notes}
        </span>
      </div>` : ''}
  `;

  // ---------- WARNINGS ----------
  const transitSources = ['Marine Mammals', 'Seabirds', 'Underway'];
  if (transitSources.includes(v.source)) {
    modalBody.innerHTML += `
      <div style="margin-top:12px;padding:10px 12px;
                  background:rgba(255,107,53,0.08);
                  border:1px solid rgba(255,107,53,0.25);
                  border-radius:4px;font-size:10px;color:var(--warm);line-height:1.6;">
        ⚠️ Transit-based data (not fixed stations)
      </div>`;
  }

  const subsetSources = ['DIC', 'Primary Production', 'Phytoplankton', 'Genomics/eDNA'];
  if (subsetSources.includes(v.source)) {
    modalBody.innerHTML += `
      <div style="margin-top:12px;padding:10px 12px;
                  background:rgba(0,194,255,0.06);
                  border:1px solid rgba(0,194,255,0.2);
                  border-radius:4px;font-size:10px;color:var(--muted);line-height:1.6;">
        ℹ️ Available at subset of stations
      </div>`;
  }

  // ---------- FOOTER LOGIC ----------
  const isERDDAP = v.url && v.url.includes("erddap/tabledap");

  if (isERDDAP) {
    const dataset = v.url.split("tabledap/")[1]?.split(".")[0];
    const variable = v.erddap_variable;

    footer.innerHTML = `
      <div style="width:100%;display:flex;flex-direction:column;gap:8px;">
        
        <a class="btn-docs"
           href="${v.url}"
           target="_blank"
           style="text-align:center">
          View Dataset ↗
        </a>

        <a id="erddap-download"
           class="btn-download"
           target="_blank"
           style="text-align:center">
          ⬇ Download CSV (this station)
        </a>
      </div>
    `;

    // Build station-aware query (if available)
    if (window.currentStation && dataset && variable) {
      const s = window.currentStation;

      const query =
        `https://coastwatch.pfeg.noaa.gov/erddap/tabledap/${dataset}.csv?` +
        `${variable},latitude,longitude,time` +
        `&latitude>=${s.lat - 0.1}&latitude<=${s.lat + 0.1}` +
        `&longitude>=${s.lon - 0.1}&longitude<=${s.lon + 0.1}`;

      document.getElementById('erddap-download').href = query;
    } else {
      document.getElementById('erddap-download').href = v.url;
    }

  } else {
    footer.innerHTML = `
      <a class="btn-docs"
         href="${v.url}"
         target="_blank"
         style="flex:1;text-align:center">
        View Data Source ↗
      </a>
    `;
  }

  modalBackdrop.classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-backdrop')) return;
  document.getElementById('modal-backdrop').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal-backdrop').classList.remove('open'); });
async function openStation(station) {
  window.currentStation = station;
  document.getElementById('panel-empty').style.display = 'none';
  document.getElementById('panel-header').style.display = 'block';
  document.getElementById('panel-station-id').textContent = `Station ${station.station_id}`;
  document.getElementById('panel-coords').textContent =
    `${station.lat.toFixed(4)}°N  ${Math.abs(station.lon).toFixed(4)}°W`;

  const content = document.getElementById('panel-content');
  content.classList.add('visible');
  content.innerHTML = '<div class="loading">Loading data…</div>';

  const res = await fetch(`${API}/stations/${encodeURIComponent(station.station_id)}`);
  const data = await res.json();

  // Group by source, then category
  const bySource = {};
  data.data.forEach(d => {
    if (!bySource[d.source]) bySource[d.source] = {};
    if (!bySource[d.source][d.category]) bySource[d.source][d.category] = [];
    bySource[d.source][d.category].push(d);
  });

  content.innerHTML = Object.entries(bySource).map(([source, cats]) => `
    <div class="source-group">
      <div class="source-label">📦 ${source}</div>
      ${Object.entries(cats).map(([cat, vars]) => `
        <div class="category-sublabel">${cat}</div>
        ${vars.map((v, i) => `
          <div class="data-link" onclick='openModal(${JSON.stringify(v)})'>
            <span class="data-link-name">${v.name}</span>
            <span class="data-link-unit">${v.unit}</span>
            <span class="data-link-arrow">⬇</span>
          </div>`).join('')}
      `).join('')}
    </div>`).join('');
}
